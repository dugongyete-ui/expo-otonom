version: "3.8"

services:
  app:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - APP_DOMAIN=${APP_DOMAIN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      # E2B Cloud Sandbox — required for shell/browser execution
      - E2B_API_KEY=${E2B_API_KEY:-}
      # Cerebras AI — required for agent LLM
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - CEREBRAS_CHAT_MODEL=${CEREBRAS_CHAT_MODEL:-}
      - CEREBRAS_AGENT_MODEL=${CEREBRAS_AGENT_MODEL:-}
      # MongoDB — optional session persistence
      - MONGODB_URI=${MONGODB_URI:-}
      # Redis — optional caching
      - REDIS_HOST=${REDIS_HOST:-}
      - REDIS_PORT=${REDIS_PORT:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    restart: unless-stopped
